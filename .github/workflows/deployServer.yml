name: Deploy Portfolio to Debian Server

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_run:
    workflows: ["Nuevo Proyecto", "Nueva entrada de Blog"]
    types:
      - completed

jobs:
  deploy:
    # REQUISITO: Ejecutarse únicamente en el runner propio instalado en el servidor Debian
    runs-on: self-hosted
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      # Paso 1: Obtener el código fuente más reciente desde GitHub
      - name: Checkout de código
        uses: actions/checkout@v4

      # Paso 2: Compilar y levantar la aplicación usando Docker Compose
      # Explicación del comando de Docker Compose:
      # - 'up -d': Levanta el contenedor en segundo plano (detached mode).
      # - '--build': Fuerza la reconstrucción de la imagen para incorporar los últimos cambios del repositorio.
      # - '--no-cache': Evita el uso de caché durante el build de Docker, asegurando que se descarguen/compilen recursos frescos.
  
      - name: Reconstruir y levantar contenedor
        run: |
          docker compose down
          docker compose build --no-cache
          docker compose up -d
