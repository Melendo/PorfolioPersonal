name: Nuevo Proyecto

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Título del proyecto'
        required: true
        type: string
      role:
        description: 'Rol o tipo de proyecto'
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generar estructura del proyecto
        run: node scripts/new-project.mjs --title "${{ inputs.title }}" --role "${{ inputs.role }}"

      - name: Commit y push de los cambios
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore(projects): crear estructura para '${{ inputs.title }}'" || echo "No hay cambios para hacer commit"
          git push
