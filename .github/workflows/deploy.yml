name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Quitamos la caché de npm porque no la necesitas

      - name: Generar la web estática
        # Ejecutamos tu script directamente con Node
        run: node build.mjs

      - name: Subir el artifact de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Tu script ya crea y llena esta carpeta

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4